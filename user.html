<!DOCTYPE html>
<html>
<head>
    <title>User Panel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body onload="renderUserTable()">

<div class="navbar">
    <h2>User Dashboard</h2>
    <a href="index.html">Logout</a>
</div>

<div class="container">

    <div class="card">
        <h2>Add Donation</h2>

        <input type="text" id="food" placeholder="Food Name">
        <input type="text" id="qty" placeholder="Quantity">
        <input type="text" id="loc" placeholder="Location">
        <input type="text" id="time" placeholder="Expiry Time">

        <button type="button" onclick="addDonation()">Add Donation</button>
    </div>

    <div class="card">
        <h2>Your Donations</h2>

        <table>
            <thead>
                <tr>
                    <th>Food</th>
                    <th>Qty</th>
                    <th>Location</th>
                    <th>Expiry</th>
                    <th>Status</th>
                </tr>
            </thead>

            <tbody id="userData"></tbody>
        </table>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
